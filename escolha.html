<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escolha uma porta</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
  :root {
    --cream: #F5F2ED;
    --ink: #1A1A18;
    --muted: #888882;
    --line: rgba(26,26,24,0.12);
  }
 
  body {
    font-family: 'DM Mono', monospace;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
 
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 3rem;
    border-bottom: 1px solid var(--line);
  }
 
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--ink);
  }
 
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 3rem;
  }
 
  .headline {
    text-align: center;
    margin-bottom: 4rem;
  }
 
  .headline p {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }
 
  .headline h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 300;
    line-height: 1.1;
  }
 
  .headline h1 em { font-style: italic; }
 
  .doors {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    width: 100%;
    max-width: 800px;
  }
 
  .door-option {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    background: #D8D4CC;
    aspect-ratio: 2/3;
    display: flex;
    align-items: flex-end;
    border: none;
    padding: 0;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
 
  .door-option:hover {
    transform: scale(1.02);
    z-index: 1;
  }
 
  .door-option img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
 
  .door-option:hover img {
    transform: scale(1.05);
  }
 
  .door-label {
    position: relative;
    z-index: 2;
    width: 100%;
    padding: 1.5rem;
    background: linear-gradient(to top, rgba(26,26,24,0.7) 0%, transparent 100%);
    color: rgba(245,242,237,0.9);
  }
 
  .door-label p {
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 0.3rem;
  }
 
  .door-label h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 300;
  }
 
  .door-overlay {
    position: absolute;
    inset: 0;
    background: rgba(26,26,24,0);
    transition: background 0.4s;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
 
  .door-option:hover .door-overlay {
    background: rgba(26,26,24,0.15);
  }
 
  .enter-text {
    font-size: 0.62rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,242,237,0);
    transition: color 0.3s;
  }
 
  .door-option:hover .enter-text {
    color: rgba(245,242,237,0.9);
  }
 
  .hint {
    text-align: center;
    margin-top: 2.5rem;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
  }
</style>
</head>
<body>
 
<nav>
  <a href="index.html" class="logo">Frame</a>
</nav>
 
<main>
  <div class="headline">
    <p>Entre em contato</p>
    <h1>Escolha uma <em>porta.</em></h1>
  </div>
 
  <div class="doors">
    <!-- Porta Vermelha -->
    <a class="door-option" href="vermelho.html">
      <img src="fotos/porta-vermelha.png" alt="Porta Vermelha">
      <div class="door-overlay">
        <span class="enter-text">Entrar →</span>
      </div>
      <div class="door-label">
        <p>Opção A</p>
        <h2>Porta Vermelha</h2>
      </div>
    </a>
 
    <!-- Porta Marrom -->
    <a class="door-option" href="marrom.html">
      <img src="fotos/porta-marrom.png" alt="Porta Marrom">
      <div class="door-overlay">
        <span class="enter-text">Entrar →</span>
      </div>
      <div class="door-label">
        <p>Opção B</p>
        <h2>Porta Marrom</h2>
      </div>
    </a>
  </div>
 
  <p class="hint">Passe o mouse sobre as portas para revelar a entrada</p>
</main>
 
</body>
</html>
